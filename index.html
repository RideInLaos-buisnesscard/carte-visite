<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride in Laos - Liens</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
        }

        body {
            /* Intégration de ton image de fond */
            background-image: url('arriereplan.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
        }

        /* Calque sombre par-dessus l'image de fond pour rendre le texte lisible */
        .background-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(30, 40, 50, 0.4), rgba(30, 40, 50, 0.2) 50%, rgba(30, 40, 50, 0.6));
            z-index: 1;
        }

        .card-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
        }

        /* Style du logo */
        .logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: white; 
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .description {
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
        }

        .description strong {
            font-weight: 700;
        }

        .profile-info {
            margin-top: 15px;
            margin-bottom: 35px;
        }

        .name {
            font-weight: 700;
            font-size: 1rem;
            display: block;
        }

        .title {
            font-weight: 700;
            font-size: 0.95rem;
            display: block;
        }

        /* Conteneur effet verre pour les boutons */
        .links-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 25px 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .btn-website {
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s ease;
        }

        .btn-website:hover {
            transform: scale(1.02);
        }

        /* Ajustement pour intégrer 5 icônes proprement */
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
        }

        .btn-icon {
            background-color: #ffffff;
            color: #000000;
            width: 45px;  /* Légèrement réduit pour faire de la place */
            height: 45px; /* Légèrement réduit pour faire de la place */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 1.2rem; /* Adapté à la nouvelle taille de la bulle */
            transition: transform 0.2s ease;
        }

        .btn-icon:hover {
            transform: scale(1.08);
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="card-container">
        
        <img src="logo.jpg" alt="Ride in Laos Logo" class="logo">
        
        <h1>Ride in Laos</h1>
        
        <p class="description">
            Ride in Laos is a motorcycle rental and<br>
            custom tour company.<br>
            <strong>With more than 10 years of local experience !</strong><br>
            based in Vientiane, Laos.
        </p>

        <div class="profile-info">
            <span class="name">David PHONGTHISOUK</span>
            <span class="title">General Manager</span>
        </div>

        <div class="links-container">
            <a href="https://rideinlaos.com" target="_blank" class="btn-website">
                Website <i class="fas fa-globe"></i>
            </a>
            
            <div class="social-links">
                <a href="https://wa.me/8562054857773" target="_blank" class="btn-icon"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.facebook.com/rideinlaos?locale=fr_FR" target="_blank" class="btn-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/rideinlaos/" target="_blank" class="btn-icon"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@rideinlaos" target="_blank" class="btn-icon"><i class="fab fa-tiktok"></i></a>
                <a href="mailto:rideinlaos@gmail.com" class="btn-icon"><i class="far fa-envelope"></i></a>
            </div>
        </div>

    </div>

</body>
</html>
